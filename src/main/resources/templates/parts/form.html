<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Новая запчасть')}"></head>
<body>
<div class="app">
    <aside th:replace="~{fragments/sidebar :: sidebar('parts')}"></aside>
    <div class="main">
        <header th:replace="~{fragments/topbar :: topbar('Новая запчасть')}"></header>
        <main class="content">
            <div class="card card-narrow">
                <div class="page-header">
                    <div>
                        <h2>Новая запчасть</h2>
                        <p>Заполните данные и загрузите изображение</p>
                    </div>
                </div>

                <div class="alert alert-error" th:if="${error != null}">
                    <span th:replace="~{fragments/icons :: icon-alert}"></span>
                    <span th:text="${error}">Ошибка</span>
                </div>

                <form method="post" th:action="@{/parts}" th:object="${part}" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="name">Название</label>
                        <input type="text" id="name" th:field="*{name}" placeholder="Например, Тормозной диск" autofocus>
                        <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Ошибка</div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="categoryId">Категория</label>
                            <select id="categoryId" th:field="*{categoryId}">
                                <option value="">Выберите категорию</option>
                                <option th:each="category : ${categories}" th:value="${category.id()}" th:text="${category.name()}">Категория</option>
                            </select>
                            <div class="field-error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}">Ошибка</div>
                        </div>
                        <div class="form-group">
                            <label for="brandId">Бренд</label>
                            <select id="brandId" th:field="*{brandId}">
                                <option value="">Выберите бренд</option>
                                <option th:each="brand : ${brands}" th:value="${brand.id()}" th:text="${brand.name()}">Бренд</option>
                            </select>
                            <div class="field-error" th:if="${#fields.hasErrors('brandId')}" th:errors="*{brandId}">Ошибка</div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="price">Цена, BYN</label>
                            <input type="number" id="price" step="0.01" min="0" th:field="*{price}" placeholder="0.00">
                            <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Ошибка</div>
                        </div>
                        <div class="form-group">
                            <label for="stock">Количество на складе</label>
                            <input type="number" id="stock" step="1" min="0" th:field="*{stock}" placeholder="0">
                            <div class="field-error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}">Ошибка</div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="image">Изображение</label>
                        <input type="file" id="image" th:field="*{image}" accept="image/*">
                        <div class="field-hint">Необязательно. JPEG или PNG</div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">
                            <span th:replace="~{fragments/icons :: icon-plus}"></span>
                            Создать
                        </button>
                        <a class="btn btn-outline" th:href="@{/parts}">Отмена</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
