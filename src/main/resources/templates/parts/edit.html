<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Редактирование запчасти')}"></head>
<body>
<div class="app">
    <aside th:replace="~{fragments/sidebar :: sidebar('parts')}"></aside>
    <div class="main">
        <header th:replace="~{fragments/topbar :: topbar('Редактирование запчасти')}"></header>
        <main class="content">
            <div class="card card-narrow">
                <div class="page-header">
                    <div>
                        <h2>Редактировать запчасть</h2>
                        <p>Название, цена и остаток на складе</p>
                    </div>
                </div>
                <form method="post" th:action="@{/parts/{id}(id=${part.id})}" th:object="${part}">
                    <input type="hidden" th:field="*{id}">

                    <div class="form-group">
                        <label for="name">Название</label>
                        <input type="text" id="name" th:field="*{name}" autofocus>
                        <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Ошибка</div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="price">Цена, BYN</label>
                            <input type="number" id="price" step="0.01" min="0" th:field="*{price}">
                            <div class="field-error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Ошибка</div>
                        </div>
                        <div class="form-group">
                            <label for="stock">Количество на складе</label>
                            <input type="number" id="stock" step="1" min="0" th:field="*{stock}">
                            <div class="field-error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}">Ошибка</div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                        <a class="btn btn-outline" th:href="@{/parts}">Отмена</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
