<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Запчасти')}"></head>
<body>
<div class="app">
    <aside th:replace="~{fragments/sidebar :: sidebar('parts')}"></aside>
    <div class="main">
        <header th:replace="~{fragments/topbar :: topbar('Запчасти')}"></header>
        <main class="content">
            <div th:replace="~{fragments/alerts :: alerts}"></div>

            <div class="card">
                <form method="get" th:action="@{/parts}" class="filter-form">
                    <div class="form-row filter-row">
                        <div class="form-group">
                            <label for="f-categoryId">Категория</label>
                            <select id="f-categoryId" name="categoryId">
                                <option value="">Все категории</option>
                                <option th:each="category : ${categories}" th:value="${category.id()}" th:text="${category.name()}"
                                        th:selected="${filter.categoryId() != null and filter.categoryId() == category.id()}">Категория</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="f-brandId">Бренд</label>
                            <select id="f-brandId" name="brandId">
                                <option value="">Все бренды</option>
                                <option th:each="brand : ${brands}" th:value="${brand.id()}" th:text="${brand.name()}"
                                        th:selected="${filter.brandId() != null and filter.brandId() == brand.id()}">Бренд</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="f-minPrice">Цена от</label>
                            <input type="number" id="f-minPrice" name="minPrice" step="0.01" min="0" placeholder="0" th:value="${filter.minPrice()}">
                        </div>
                        <div class="form-group">
                            <label for="f-maxPrice">Цена до</label>
                            <input type="number" id="f-maxPrice" name="maxPrice" step="0.01" min="0" placeholder="∞" th:value="${filter.maxPrice()}">
                        </div>
                    </div>
                    <div class="filter-actions">
                        <label class="checkbox-label">
                            <input type="checkbox" name="inStockOnly" value="true" th:checked="${filter.inStockOnly() != null and filter.inStockOnly()}">
                            Только в наличии
                        </label>
                        <div class="filter-buttons">
                            <button type="submit" class="btn btn-primary btn-sm">
                                <span th:replace="~{fragments/icons :: icon-check}"></span>
                                Применить
                            </button>
                            <a class="btn btn-outline btn-sm" th:href="@{/parts}">Сбросить</a>
                        </div>
                    </div>
                </form>
            </div>

            <div class="card">
                <div class="page-header">
                    <div>
                        <h2>Каталог запчастей</h2>
                        <p th:text="${parts.totalElements} + ' найдено'">0 всего</p>
                    </div>
                    <a class="btn btn-primary" th:href="@{/parts/new}">
                        <span th:replace="~{fragments/icons :: icon-plus}"></span>
                        Добавить запчасть
                    </a>
                </div>

                <div th:if="${parts.empty}" class="empty-state">
                    <div class="icon" th:insert="~{fragments/icons :: icon-part}"></div>
                    <h3>Пока нет запчастей</h3>
                    <p>Добавьте первую запчасть в каталог</p>
                    <a class="btn btn-primary" th:href="@{/parts/new}">Добавить запчасть</a>
                </div>

                <div class="table-wrap" th:unless="${parts.empty}">
                    <table>
                        <thead>
                        <tr>
                            <th>Запчасть</th>
                            <th>Категория</th>
                            <th>Бренд</th>
                            <th>Цена</th>
                            <th>Наличие</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="part : ${parts.content}">
                            <td>
                                <div class="cell-with-thumb">
                                    <img class="thumb" th:src="@{/parts/{id}/image(id=${part.id()})}" alt=""
                                         onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                    <span class="thumb-placeholder" style="display:none" th:insert="~{fragments/icons :: icon-image}"></span>
                                    <span class="cell-name" th:text="${part.name()}">Название</span>
                                </div>
                            </td>
                            <td class="cell-muted" th:text="${categoryNames.get(part.categoryId()) ?: '—'}">Категория</td>
                            <td class="cell-muted" th:text="${brandNames.get(part.brandId()) ?: '—'}">Бренд</td>
                            <td th:text="${part.price()} + ' BYN'">0 BYN</td>
                            <td>
                                <span class="badge" th:classappend="${part.stock() != null and part.stock() > 0} ? 'badge-success' : 'badge-danger'"
                                      th:text="${part.stock() != null ? part.stock() : 0} + ' шт.'">0 шт.</span>
                            </td>
                            <td>
                                <div class="row-actions">
                                    <a class="btn btn-outline btn-sm btn-icon" th:href="@{/parts/{id}/edit(id=${part.id()})}" title="Редактировать">
                                        <span th:replace="~{fragments/icons :: icon-edit}"></span>
                                    </a>
                                    <form method="post" th:action="@{/parts/{id}/delete(id=${part.id()})}"
                                          onsubmit="return confirm('Удалить запчасть «' + this.dataset.name + '»?');" th:attr="data-name=${part.name()}">
                                        <button type="submit" class="btn btn-danger btn-sm btn-icon" title="Удалить">
                                            <span th:replace="~{fragments/icons :: icon-trash}"></span>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="pagination" th:if="${parts.totalPages > 1}">
                    <a th:href="@{/parts(page=${parts.number - 1}, categoryId=${filter.categoryId}, brandId=${filter.brandId}, minPrice=${filter.minPrice}, maxPrice=${filter.maxPrice}, inStockOnly=${filter.inStockOnly})}"
                       th:classappend="${parts.first} ? 'disabled'">
                        <span th:replace="~{fragments/icons :: icon-chevron-left}"></span>
                    </a>
                    <th:block th:each="i : ${#numbers.sequence(0, parts.totalPages - 1)}">
                        <a th:href="@{/parts(page=${i}, categoryId=${filter.categoryId}, brandId=${filter.brandId}, minPrice=${filter.minPrice}, maxPrice=${filter.maxPrice}, inStockOnly=${filter.inStockOnly})}"
                           th:text="${i + 1}" th:classappend="${i == parts.number} ? 'active'">1</a>
                    </th:block>
                    <a th:href="@{/parts(page=${parts.number + 1}, categoryId=${filter.categoryId}, brandId=${filter.brandId}, minPrice=${filter.minPrice}, maxPrice=${filter.maxPrice}, inStockOnly=${filter.inStockOnly})}"
                       th:classappend="${parts.last} ? 'disabled'">
                        <span th:replace="~{fragments/icons :: icon-chevron-right}"></span>
                    </a>
                </div>
            </div>
        </main>
    </div>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
