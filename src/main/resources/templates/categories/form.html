<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Новая категория')}"></head>
<body>
<div class="app">
    <aside th:replace="~{fragments/sidebar :: sidebar('categories')}"></aside>
    <div class="main">
        <header th:replace="~{fragments/topbar :: topbar('Новая категория')}"></header>
        <main class="content">
            <div class="card card-narrow">
                <div class="page-header">
                    <div>
                        <h2>Новая категория</h2>
                        <p>Укажите название категории запчастей</p>
                    </div>
                </div>
                <form method="post" th:action="@{/categories}" th:object="${category}">
                    <div class="form-group">
                        <label for="name">Название</label>
                        <input type="text" id="name" th:field="*{name}" placeholder="Например, Тормозная система" autofocus>
                        <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Ошибка</div>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">
                            <span th:replace="~{fragments/icons :: icon-plus}"></span>
                            Создать
                        </button>
                        <a class="btn btn-outline" th:href="@{/categories}">Отмена</a>
                    </div>
                </form>
            </div>
        </main>
    </div>
</div>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
